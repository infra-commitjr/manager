<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commit JR — Portal</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600;700&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--bg1:#0e1118;--bg2:#151921;--bg3:#1d2330;
  --border:#252d3d;--border2:#2f3a4f;
  --txt:#dce7f5;--txt2:#7a8fa8;--txt3:#465670;
  --accent:#4f8ef7;--accent2:#2a5cbf;--accent-bg:rgba(79,142,247,.1);
  --green:#34d399;--green-bg:rgba(52,211,153,.08);--green2:#059669;
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,.08);
  --red:#f87171;--red-bg:rgba(248,113,113,.08);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.08);--purple2:#7c3aed;
  --r:12px;--r2:8px;--r3:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg1);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ── Layout ── */
#app{display:flex;flex-direction:column;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:60px;background:var(--bg1);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;gap:16px;flex-wrap:wrap;}
.logo-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:#fff;}
.logo-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--txt);letter-spacing:-.3px;}
.logo-tag{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--txt3);letter-spacing:.5px;margin-top:1px;}
.nav-tabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:3px;flex-wrap:wrap;}
.nav-tab{padding:6px 14px;border:none;background:none;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--txt3);border-radius:6px;transition:all .15s;white-space:nowrap;}
.nav-tab:hover{color:var(--txt2);background:var(--bg3);}
.nav-tab.active{background:var(--accent-bg);color:var(--accent);border:1px solid rgba(79,142,247,.25);}
.nav-tab.adm-tab.active{background:var(--red-bg);color:var(--red);border-color:rgba(248,113,113,.25);}
.nav-tab.pj-tab.active{background:var(--purple-bg);color:var(--purple);border-color:rgba(167,139,250,.25);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.icon-btn{width:32px;height:32px;border:1px solid var(--border2);border-radius:var(--r2);background:var(--bg2);cursor:pointer;color:var(--txt3);display:flex;align-items:center;justify-content:center;transition:all .15s;}
.icon-btn:hover{color:var(--red);border-color:rgba(248,113,113,.3);}
.main{flex:1;padding:28px;max-width:1400px;margin:0 auto;width:100%;}

/* ── Stats ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px;}
.stat{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r3);padding:16px 18px;position:relative;overflow:hidden;}
.stat::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.3;}
.stat-label{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
.stat-val{font-size:26px;font-weight:700;font-family:'Syne',sans-serif;color:var(--txt);}
.stat-val.g{color:var(--green);}.stat-val.a{color:var(--amber);}.stat-val.r{color:var(--red);}.stat-val.b{color:var(--accent);}.stat-val.p{color:var(--purple);}
.stat-sub{font-size:11px;color:var(--txt3);margin-top:3px;}

/* ── Toolbar ── */
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.toolbar-left{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.search-wrap{position:relative;}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none;}
.search-input{background:var(--bg1);border:1px solid var(--border2);border-radius:var(--r2);padding:8px 12px 8px 34px;font-size:13px;color:var(--txt);width:200px;font-family:'Figtree',sans-serif;outline:none;transition:border-color .15s;}
.search-input:focus{border-color:var(--accent);}
.select-pill{background:var(--bg1);border:1px solid var(--border2);border-radius:var(--r2);padding:7px 10px;font-size:12px;color:var(--txt2);cursor:pointer;font-family:'JetBrains Mono',monospace;outline:none;}
.select-pill:focus{border-color:var(--accent);}
.btn{padding:8px 16px;border:none;border-radius:var(--r2);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:#6aa3ff;}
.btn-ghost{background:var(--bg2);color:var(--txt2);border:1px solid var(--border2);}.btn-ghost:hover{color:var(--txt);}
.btn-green{background:var(--green2);color:#fff;}.btn-green:hover{background:#10b981;}
.btn-red{background:rgba(153,27,27,.6);color:var(--red);border:1px solid rgba(248,113,113,.2);}.btn-red:hover{background:rgba(153,27,27,.9);}
.btn-amber{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(251,191,36,.2);}
.btn-purple{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(167,139,250,.3);}.btn-purple:hover{background:rgba(167,139,250,.15);}
.btn-sm{padding:5px 10px;font-size:10px;}

/* ── Cards ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;}
.member-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r3);padding:20px;cursor:pointer;transition:border-color .2s,transform .2s,box-shadow .2s;position:relative;overflow:hidden;animation:fadeUp .35s ease both;}
.member-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4);}
.member-card.crit{border-color:rgba(248,113,113,.3);animation:fadeUp .35s ease both,pulsered 2.5s ease infinite;}
.member-card.inactive{opacity:.65;}
@keyframes pulsered{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,0);}50%{box-shadow:0 0 0 6px rgba(248,113,113,.15);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:8px;}
/* Avatar with photo support */
.card-avatar{width:40px;height:40px;border-radius:10px;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--accent);flex-shrink:0;overflow:hidden;}
.card-avatar img{width:100%;height:100%;object-fit:cover;display:block;}
.card-info{flex:1;min-width:0;}
.card-name{font-size:14px;font-weight:600;color:var(--txt);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-role{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--accent);text-transform:uppercase;letter-spacing:.4px;margin-top:2px;}
.card-badges{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.od-badge{background:var(--amber-bg);border:1px solid rgba(251,191,36,.3);color:var(--amber);font-size:9px;font-family:'JetBrains Mono',monospace;font-weight:600;padding:2px 7px;border-radius:5px;text-transform:uppercase;white-space:nowrap;}
.ex-badge{background:var(--red-bg);border:1px solid rgba(248,113,113,.3);color:var(--red);font-size:9px;font-family:'JetBrains Mono',monospace;font-weight:600;padding:2px 7px;border-radius:5px;text-transform:uppercase;white-space:nowrap;}

.hours-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--r2);padding:12px 16px;margin:12px 0;text-align:center;}
.hours-box-label{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;}
.hours-big{font-size:38px;font-weight:700;font-family:'Syne',sans-serif;color:var(--green);line-height:1;}
.hours-unit{font-size:14px;color:var(--green2);margin-left:2px;}
.hours-sub{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;margin-top:2px;}
.card-foot{display:flex;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border);}
.foot-lbl{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;}
.foot-val{font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--txt);margin-top:2px;}
.foot-val.g{color:var(--green);}.foot-val.a{color:var(--amber);}.foot-val.r{color:var(--red);}
.prog-track{height:3px;background:var(--bg3);border-radius:2px;margin-top:10px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;transition:width .5s ease;}
.prog-fill.g{background:var(--green);}.prog-fill.a{background:var(--amber);}.prog-fill.r{background:var(--red);}

/* ── Pós-Júnior cards ── */
.pj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
.pj-card{background:var(--bg1);border:1px solid rgba(167,139,250,.2);border-radius:var(--r3);padding:24px;cursor:pointer;transition:all .2s;animation:fadeUp .35s ease both;position:relative;overflow:hidden;}
.pj-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--purple),transparent);opacity:.6;}
.pj-card:hover{border-color:rgba(167,139,250,.5);transform:translateY(-2px);box-shadow:0 8px 32px rgba(167,139,250,.1);}
.pj-avatar{width:56px;height:56px;border-radius:14px;background:var(--purple-bg);border:1px solid rgba(167,139,250,.3);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--purple);flex-shrink:0;overflow:hidden;}
.pj-avatar img{width:100%;height:100%;object-fit:cover;display:block;}
.pj-name{font-size:16px;font-weight:700;color:var(--txt);}
.pj-period{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--txt3);margin-top:2px;}
.pj-hours-big{font-size:44px;font-weight:800;font-family:'Syne',sans-serif;color:var(--purple);line-height:1;}
.pj-hours-lbl{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;}
.pj-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:600;background:var(--purple-bg);color:var(--purple);border:1px solid rgba(167,139,250,.25);}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(7,9,15,.85);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--bg1);border:1px solid var(--border2);border-radius:var(--r3);width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 40px 80px rgba(0,0,0,.6);animation:fadeUp .25s ease;}
.modal-sm{max-width:420px;}.modal-md{max-width:580px;}.modal-lg{max-width:740px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--txt);}
.modal-close{background:none;border:none;cursor:pointer;color:var(--txt3);padding:4px;border-radius:6px;transition:color .15s;font-size:18px;line-height:1;}
.modal-close:hover{color:var(--red);}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;}

/* ── Forms ── */
.field{margin-bottom:14px;}
.field-label{display:block;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
.field-input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);padding:9px 12px;color:var(--txt);font-family:'Figtree',sans-serif;font-size:13px;outline:none;transition:border-color .15s;}
.field-input:focus{border-color:var(--accent);}
.field-row.c2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field-row.c3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

/* ── Photo upload ── */
.photo-upload-wrap{display:flex;align-items:center;gap:16px;margin-bottom:14px;}
.photo-preview{width:64px;height:64px;border-radius:12px;background:var(--bg3);border:1px solid var(--border2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--txt3);flex-shrink:0;}
.photo-preview img{width:100%;height:100%;object-fit:cover;}
.photo-upload-btn{display:flex;flex-direction:column;gap:4px;}
.photo-upload-btn label{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--txt2);cursor:pointer;transition:all .15s;}
.photo-upload-btn label:hover{color:var(--txt);border-color:var(--border2);}
.photo-upload-btn small{font-size:10px;color:var(--txt3);font-family:'JetBrains Mono',monospace;}

/* ── Conduct ── */
.section-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--txt);margin-bottom:18px;display:flex;align-items:center;gap:10px;}
.section-title::before{content:'';width:3px;height:20px;background:var(--accent);border-radius:2px;display:inline-block;}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:600;letter-spacing:.3px;}
.badge-r{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.2);}
.badge-a{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(251,191,36,.2);}
.badge-g{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,.2);}
.badge-b{background:var(--accent-bg);color:var(--accent);border:1px solid rgba(79,142,247,.2);}
.badge-p{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(167,139,250,.2);}
.badge-gray{background:var(--bg3);color:var(--txt3);border:1px solid var(--border);}
.conduct-list{display:flex;flex-direction:column;gap:10px;}
.conduct-row{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.conduct-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;transition:background .15s;gap:12px;}
.conduct-head:hover{background:var(--bg2);}
.conduct-info{display:flex;align-items:center;gap:14px;}
.conduct-name{font-size:13px;font-weight:600;color:var(--txt);}
.conduct-role{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--txt3);text-transform:uppercase;}
table.tbl{width:100%;border-collapse:collapse;}
.tbl th{padding:10px 18px;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;text-align:left;background:var(--bg2);border-bottom:1px solid var(--border);}
.tbl td{padding:11px 18px;font-size:12px;color:var(--txt2);border-bottom:1px solid var(--border);}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--bg2);}
.tbl tr.expired td{opacity:.35;}
.tbl td.pts{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--red);text-align:right;}
.tbl td.mono{font-family:'JetBrains Mono',monospace;}

/* ── Admin ── */
.adm-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:24px;}
.adm-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r3);padding:22px;}
.adm-card-title{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.adm-card-title::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.adm-card-title.purple::before{background:var(--purple);}
.table-wrap{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r3);overflow:hidden;}
.table-head-bar{padding:14px 18px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.overflow-x{overflow-x:auto;}
.mini-input{width:60px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:5px 8px;color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:11px;text-align:center;outline:none;}
.mini-input:focus{border-color:var(--accent);}
.mini-toggle{padding:4px 10px;border-radius:5px;font-size:9px;font-family:'JetBrains Mono',monospace;font-weight:700;text-transform:uppercase;cursor:pointer;border:1px solid;transition:all .15s;}
.mini-toggle.on{background:var(--amber-bg);color:var(--amber);border-color:rgba(251,191,36,.3);}
.mini-toggle.off{background:var(--bg3);color:var(--txt3);border-color:var(--border);}
.del-btn{background:none;border:none;cursor:pointer;color:var(--txt3);padding:6px;border-radius:6px;transition:all .15s;display:inline-flex;align-items:center;gap:4px;font-size:11px;}
.del-btn:hover{color:var(--red);background:var(--red-bg);}

/* ── Roles ── */
.roles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:20px;}
.role-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
.role-key{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;}
.role-label-val{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:12px;}
.edit-inline{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;color:var(--txt);font-family:'Figtree',sans-serif;font-size:13px;outline:none;margin-bottom:8px;}
.edit-inline:focus{border-color:var(--accent);}

/* ── Drop zone ── */
.drop-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:32px;text-align:center;transition:all .15s;cursor:pointer;}
.drop-zone:hover,.drop-zone.drag{border-color:var(--accent);background:var(--accent-bg);}
.drop-zone p{font-size:13px;color:var(--txt2);margin-top:8px;}
.drop-zone small{font-size:11px;color:var(--txt3);font-family:'JetBrains Mono',monospace;}

/* ── Misc ── */
.role-tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-family:'JetBrains Mono',monospace;background:var(--bg3);color:var(--txt3);border:1px solid var(--border);margin:1px;}
.loader-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px;}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-txt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--txt3);letter-spacing:.8px;}
.empty{text-align:center;padding:60px 20px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--txt3);}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--green2);border-radius:10px;padding:12px 18px;font-size:13px;color:var(--green);font-family:'JetBrains Mono',monospace;z-index:9999;animation:fadeUp .25s ease;box-shadow:0 8px 32px rgba(0,0,0,.4);}
.toast.err{border-color:var(--red);color:var(--red);}

<body>
<div id="app">
  <div class="loader-wrap"><div class="spinner"></div><p class="loader-txt">inicializando...</p></div>
</div>
<script>
// ── Firebase ─────────────────────────────────────────────
const fbCfg={apiKey:"AIzaSyCasLIhPZ-eu_wisn0fNzNVEymGUouJaS0",authDomain:"minhas-finacas.firebaseapp.com",projectId:"minhas-finacas",storageBucket:"minhas-finacas.firebasestorage.app",messagingSenderId:"1056339749032",appId:"1:1056339749032:web:375d2b01c4cba2a32efa9d"};
if(!firebase.apps.length) firebase.initializeApp(fbCfg);
const db=firebase.firestore(),auth=firebase.auth();
const APP='commit-v5';
const memberDoc =()=>db.collection('artifacts').doc(APP).collection('public').doc('data').collection('members').doc('list');
const pjDoc     =()=>db.collection('artifacts').doc(APP).collection('public').doc('data').collection('members').doc('pj');
const cfgDoc    =()=>db.collection('artifacts').doc(APP).collection('public').doc('config');
const SYS_START =new Date('2026-01-01');

// ── Default roles ────────────────────────────────────────
const DEF_ROLES={conselheiro:{label:'Conselheiro',hours:20},diretor:{label:'Diretor',hours:16},gerente:{label:'Gerente',hours:12},membro:{label:'Membro',hours:8}};

// ── State ────────────────────────────────────────────────
const S={
  members:[],pjMembers:[],roles:{...DEF_ROLES},
  user:null,isAdmin:false,
  view:'dashboard',sort:'nome',search:'',showInactive:false,
  loading:true,modal:null,modalData:null,openConduct:{}
};

// ── Helpers ──────────────────────────────────────────────
const initials=n=>n.trim().split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
const today=()=>new Date().toISOString().split('T')[0];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const fmtDate=d=>{if(!d)return'—';return new Date(d).toLocaleDateString('pt-BR');};
const fmtTenure=d=>{if(!d)return'—';const diff=Math.max(0,Date.now()-new Date(d));const days=Math.ceil(diff/864e5);const mo=Math.floor(days/30.41);const yr=Math.floor(mo/12);return yr>0?`${yr}a ${mo%12}m`:mo>0?`${mo}m`:`${days}d`;};
const curRoleKey=m=>(m.roleHistory||[]).at(-1)?.role||'membro';
const curRoleLabel=m=>(S.roles[curRoleKey(m)]||DEF_ROLES.membro).label;
const roleHours=rk=>(S.roles[rk]||DEF_ROLES.membro).hours;
const isActive=m=>!m.exitDate&&!m.isPJ;

const weeklyRate=m=>{
  if(!isActive(m)) return 0;
  const rk=curRoleKey(m);
  return roleHours(rk)+(m.isOverdelivery?4:0)+(m.extraHours||0)-(m.penaltyHours||0);
};

const accumulated=m=>{
  // PJ members: hours are stored as a fixed snapshot
  if(m.isPJ) return m.frozenHours||0;
  if(!(m.roleHistory?.length)) return 0;
  const hist=[...m.roleHistory].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const periodEnd=m.exitDate?new Date(m.exitDate):new Date();
  let total=0;
  hist.forEach((e,i)=>{
    const s=new Date(e.date),ps=s>SYS_START?s:SYS_START;
    const pe=hist[i+1]?new Date(hist[i+1].date):periodEnd;
    const actualPe=pe<periodEnd?pe:periodEnd;
    if(actualPe>ps) total+=(actualPe-ps)/(7*864e5)*roleHours(e.role);
  });
  return Math.floor(total);
};

const activePts=(h=[])=>{const c=new Date();c.setMonth(c.getMonth()-8);return h.filter(x=>new Date(x.date)>=c).reduce((s,x)=>s+Number(x.points),0);};
const condColor=pts=>pts>=20?'r':pts>=15?'a':'g';

// Avatar HTML helper — shows photo if available, else initials
const avatarHTML=(m,size=40,radius=10)=>{
  const style=`width:${size}px;height:${size}px;border-radius:${radius}px;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:${Math.floor(size*.33)}px;font-weight:700;color:var(--accent);flex-shrink:0;overflow:hidden;`;
  if(m.photo) return `<div style="${style}"><img src="${m.photo}" style="width:100%;height:100%;object-fit:cover;display:block;" alt=""></div>`;
  return `<div style="${style}">${initials(m.name)}</div>`;
};

// ── Persistence ───────────────────────────────────────────
async function saveMembers(members){
  if(!S.isAdmin) return;
  try{await memberDoc().set({members},{merge:true});toast('Salvo ✓');}
  catch(e){toast('Erro: '+e.message,true);}
}
async function savePJ(pjMembers){
  if(!S.isAdmin) return;
  try{await pjDoc().set({members:pjMembers},{merge:true});toast('Pós-Júnior salvo ✓');}
  catch(e){toast('Erro: '+e.message,true);}
}
async function saveRoles(roles){
  if(!S.isAdmin) return;
  try{await cfgDoc().set({roles},{merge:true});toast('Cargos salvos ✓');}
  catch(e){toast('Erro: '+e.message,true);}
}

// ── Toast ─────────────────────────────────────────────────
function toast(msg,err=false){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');
  t.className='toast'+(err?' err':'');
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2800);
}

// ── Export CSV ────────────────────────────────────────────
function exportCSV(){
  const rows=[['Nome','Tipo','Status','Cargo Atual','h/sem','Horas Acumuladas','Data Entrada','Data Saída','Data Graduação PJ','Extra h/sem','Desconto h/sem','Overdelivery','Semana OD','Conduta (pts)','Histórico de Cargos','Horas por Cargo']];
  const all=[...S.members.map(m=>({...m,_tipo:'Membro'})),...S.pjMembers.map(m=>({...m,_tipo:'Pós-Júnior',isPJ:true}))];
  all.forEach(m=>{
    const histStr=(m.roleHistory||[]).sort((a,b)=>new Date(a.date)-new Date(b.date)).map(r=>`${(S.roles[r.role]||DEF_ROLES.membro).label}(${roleHours(r.role)}h) desde ${r.date}`).join(' → ');
    const hpRole=(m.roleHistory||[]).sort((a,b)=>new Date(a.date)-new Date(b.date)).map((r,i,arr)=>{
      const s=new Date(r.date),ps=s>SYS_START?s:SYS_START;
      const endDate=m.exitDate?new Date(m.exitDate):m.isPJ?new Date(m.pjDate||today()):new Date();
      const pe=arr[i+1]?new Date(arr[i+1].date):endDate;
      const actualPe=pe<endDate?pe:endDate;
      if(actualPe<=ps) return null;
      const h=Math.floor((actualPe-ps)/(7*864e5)*roleHours(r.role));
      return `${(S.roles[r.role]||DEF_ROLES.membro).label}:${h}h`;
    }).filter(Boolean).join(' | ');
    rows.push([m.name,m._tipo,m.isPJ?'Pós-Júnior':isActive(m)?'Ativo':'Inativo',curRoleLabel(m),weeklyRate(m),accumulated(m),m.startDate||'',m.exitDate||'',m.pjDate||'',m.extraHours||0,m.penaltyHours||0,m.isOverdelivery?'Sim':'Não',m.overdeliveryDate||'',activePts(m.conductHistory)+'/20',histStr,hpRole]);
  });
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`commit-membros-${today()}.csv`;a.click();URL.revokeObjectURL(url);
  toast('CSV exportado ✓');
}

// ── Image to base64 ───────────────────────────────────────
function readImageAsBase64(file){
  return new Promise((res,rej)=>{
    if(file.size>500*1024){rej(new Error('Imagem muito grande (máx 500 KB)'));return;}
    const r=new FileReader();
    r.onload=e=>{
      // Resize to max 200x200 via canvas to keep Firestore small
      const img=new Image();
      img.onload=()=>{
        const MAX=200;
        let w=img.width,h=img.height;
        if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}
        else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
        const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        res(canvas.toDataURL('image/jpeg',.82));
      };
      img.onerror=rej;
      img.src=e.target.result;
    };
    r.onerror=rej;r.readAsDataURL(file);
  });
}

// ── Render ────────────────────────────────────────────────
function render(){
  if(S.loading){document.getElementById('app').innerHTML=`<div class="loader-wrap"><div class="spinner"></div><p class="loader-txt">carregando...</p></div>`;return;}
  document.getElementById('app').innerHTML=buildApp();
  attachListeners();
  renderModal();
}

function sortList(list){
  return [...list].sort((a,b)=>{
    if(S.sort==='nome') return a.name.localeCompare(b.name,'pt');
    if(S.sort==='horas') return accumulated(b)-accumulated(a);
    if(S.sort==='tempo'){return new Date(a.startDate||0)-new Date(b.startDate||0);}
    if(S.sort==='nota') return activePts(b.conductHistory)-activePts(a.conductHistory);
    return 0;
  });
}

function buildApp(){
  const {view,isAdmin}=S;
  let filtered=S.members.filter(m=>{
    if(!S.showInactive&&!isActive(m)) return false;
    if(S.search&&!m.name.toLowerCase().includes(S.search.toLowerCase())) return false;
    return true;
  });
  filtered=sortList(filtered);
  const active=S.members.filter(m=>isActive(m));
  const totalH=active.reduce((s,m)=>s+accumulated(m),0);
  const odCount=active.filter(m=>m.isOverdelivery).length;
  const critCount=active.filter(m=>activePts(m.conductHistory)>=20).length;
  const inactiveCount=S.members.filter(m=>!isActive(m)).length;
  const pjCount=S.pjMembers.length;
  const totalPJH=S.pjMembers.reduce((s,m)=>s+(m.frozenHours||0),0);

  return `<div>

      <div><div class="logo-name">Commit JR</div><div class="logo-tag">Extension Portal</div></div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab ${view==='dashboard'?'active':''}" data-view="dashboard">Painel</button>
      <button class="nav-tab pj-tab ${view==='posjunior'?'active':''}" data-view="posjunior">Pós-Júnior${pjCount>0?` (${pjCount})`:''}</button>
      ${isAdmin?`<button class="nav-tab adm-tab ${view==='conduct'?'active':''}" data-view="conduct">Conduta</button>`:''}
      ${isAdmin?`<button class="nav-tab adm-tab ${view==='admin'?'active':''}" data-view="admin">Gestão</button>`:''}
      ${isAdmin?`<button class="nav-tab adm-tab ${view==='roles'?'active':''}" data-view="roles">Cargos</button>`:''}
      ${!isAdmin?`<button class="nav-tab" id="loginBtn">Admin</button>`:''}
    </div>
    <div class="topbar-right">
      ${isAdmin?`<button class="btn btn-ghost btn-sm" id="exportBtn">⬇ CSV</button>`:''}
      ${isAdmin?`<button class="icon-btn" id="logoutBtn" title="Sair"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg></button>`:''}
    </div>
  </div>
  <div class="main">
    ${view==='dashboard'?buildDashboard(filtered,active,totalH,odCount,critCount,inactiveCount,pjCount):''}
    ${view==='posjunior'?buildPJView(totalPJH):''}
    ${view==='conduct'&&isAdmin?buildConduct():''}
    ${view==='admin'&&isAdmin?buildAdmin():''}
    ${view==='roles'&&isAdmin?buildRoles():''}
  </div></div>`;
}

// ── Dashboard ─────────────────────────────────────────────
function buildDashboard(filtered,active,totalH,odCount,critCount,inactiveCount,pjCount){
  const {isAdmin,search,sort,showInactive}=S;
  return `
  <div class="stats-row">
    <div class="stat"><div class="stat-label">Membros Ativos</div><div class="stat-val b">${active.length}</div><div class="stat-sub">${inactiveCount} inativos</div></div>
    <div class="stat"><div class="stat-label">Horas Acumuladas</div><div class="stat-val g">${totalH}</div><div class="stat-sub">membros ativos</div></div>
    <div class="stat"><div class="stat-label">Overdelivery</div><div class="stat-val a">${odCount}</div><div class="stat-sub">esta semana</div></div>
    <div class="stat"><div class="stat-label">Pós-Júnior</div><div class="stat-val p">${pjCount}</div><div class="stat-sub">graduados</div></div>
    ${isAdmin?`<div class="stat"><div class="stat-label">Alertas Conduta</div><div class="stat-val r">${critCount}</div><div class="stat-sub">20+ pontos</div></div>`:''}
  </div>
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="search-wrap">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input class="search-input" id="searchInput" type="text" placeholder="Buscar membro…" value="${search}">
      </div>
      <select class="select-pill" id="sortSelect">
        <option value="nome" ${sort==='nome'?'selected':''}>A–Z Nome</option>
        <option value="horas" ${sort==='horas'?'selected':''}>↓ Mais horas</option>
        <option value="tempo" ${sort==='tempo'?'selected':''}>↑ Mais antigo</option>
        ${isAdmin?`<option value="nota" ${sort==='nota'?'selected':''}>↓ Maior conduta</option>`:''}
      </select>
      ${inactiveCount>0?`<button class="filter-badge ${showInactive?'act':''}" id="toggleInactive">${showInactive?'Ocultar':'Mostrar'} inativos (${inactiveCount})</button>`:''}
    </div>
    <div style="display:flex;gap:8px">
      ${isAdmin?`<button class="btn btn-ghost btn-sm" id="importBtn">⬆ Importar CSV</button>`:''}
      ${isAdmin?`<button class="btn btn-primary" id="addMemberBtn">+ Membro</button>`:''}
    </div>
  </div>
  ${filtered.length===0?`<div class="empty">// nenhum membro encontrado</div>`:`
  <div class="cards-grid">${filtered.map((m,i)=>buildCard(m,i)).join('')}</div>`}`;
}

function buildCard(m,i){
  const pts=activePts(m.conductHistory),acc=accumulated(m),rate=weeklyRate(m);
  const crit=S.isAdmin&&pts>=20&&isActive(m);
  const inactive=!isActive(m);
  const cc=condColor(pts),pct=Math.min(pts/20*100,100);
  return `<div class="member-card ${crit?'crit':''} ${inactive?'inactive':''}" data-id="${m.id}" style="animation-delay:${i*0.04}s">
    <div class="card-header">
      ${avatarHTML(m,40,10)}
      <div class="card-info">
        <div class="card-name" title="${m.name}">${m.name}</div>
        <div class="card-role">${curRoleLabel(m)}</div>
      </div>
      <div class="card-badges">
        ${inactive?`<span class="ex-badge">Inativo</span>`:''}
        ${m.isOverdelivery&&!inactive?`<span class="od-badge">⚡ OD</span>`:''}
      </div>
    </div>
    <div class="hours-box">
      <div class="hours-box-label">${inactive?'Horas Finais':'Carga Acumulada'}</div>
      <div><span class="hours-big">${acc}</span><span class="hours-unit">h</span></div>
      <div class="hours-sub">${inactive?`saída: ${fmtDate(m.exitDate)}`:`${rate}h/sem`}</div>
    </div>
    <div class="card-foot">
      <div><div class="foot-lbl">Ritmo</div><div class="foot-val ${inactive?'':'g'}">${inactive?'—':rate+'h/sem'}</div></div>
      ${S.isAdmin?`<div style="text-align:center"><div class="foot-lbl">Conduta</div><div class="foot-val ${cc}">${pts}/20</div></div>`:''}
      <div style="text-align:right"><div class="foot-lbl">Casa</div><div class="foot-val">${fmtTenure(m.startDate)}</div></div>
    </div>
    ${S.isAdmin?`<div class="prog-track"><div class="prog-fill ${cc}" style="width:${pct}%"></div></div>`:''}
  </div>`;
}

// ── Pós-Júnior view ───────────────────────────────────────

    <div>
      <div class="section-title" style="margin-bottom:4px">Pós-Júnior</div>
      <p style="font-size:13px;color:var(--txt2)">Membros graduados que contribuíram com a Commit JR. As horas ficam congeladas no momento da graduação.</p>
    </div>
    ${S.isAdmin?`<button class="btn btn-purple" id="promotePJBtn">⭐ Graduar Membro</button>`:''}
  </div>
  <div class="stats-row" style="margin-bottom:28px">
    <div class="stat"><div class="stat-label">Graduados</div><div class="stat-val p">${S.pjMembers.length}</div><div class="stat-sub">pós-júnior</div></div>
    <div class="stat"><div class="stat-label">Total de Horas</div><div class="stat-val p">${totalPJH}</div><div class="stat-sub">contribuídas</div></div>
    ${S.pjMembers.length>0?`<div class="stat"><div class="stat-label">Média de Horas</div><div class="stat-val">${Math.round(totalPJH/S.pjMembers.length)}</div><div class="stat-sub">por graduado</div></div>`:''}

  ${pj.length===0?`<div class="empty">// nenhum membro pós-júnior ainda<br><br>${S.isAdmin?'Use o botão "Graduar Membro" para promover um membro ativo.':''}</div>`:`
  <div class="pj-grid">${pj.map((m,i)=>buildPJCard(m,i)).join('')}</div>`}`;

        <div class="pj-name">${m.name}</div>

  </div>`;

// ── Conduct view ──────────────────────────────────────────
function buildConduct(){
  const sorted=[...S.members].sort((a,b)=>activePts(b.conductHistory)-activePts(a.conductHistory));
  const cutoff=new Date();cutoff.setMonth(cutoff.getMonth()-8);

    const pts=activePts(m.conductHistory),cc=condColor(pts),open=S.openConduct[m.id],pct=Math.min(pts/20*100,100);
    return `<div class="conduct-row">
      <div class="conduct-head" data-cid="${m.id}">

          <div style="display:flex;align-items:center;gap:10px">
            ${avatarHTML(m,30,7)}
            <div><div class="conduct-name">${m.name}${!isActive(m)?` <span class="badge badge-gray" style="font-size:8px;margin-left:4px">Inativo</span>`:''}</div><div class="conduct-role">${curRoleLabel(m)}</div></div>
          </div>
        </div>

// ── Graduate action (shared) ──────────────────────────────
async function doGraduateAction(mid, pjDate, pjNote){
  const m=S.members.find(x=>x.id===mid);
  if(!m){toast('Membro não encontrado',true);return;}
  const frozenHours=accumulated(m);
  const pjMember={...m,isPJ:true,pjDate,pjNote:pjNote||'',frozenHours,exitDate:pjDate};
  // add to pj list, remove from active members
  const newPJ=[...S.pjMembers,pjMember];
  const newMs=S.members.filter(x=>x.id!==mid);
  S.pjMembers=newPJ;S.members=newMs;
  await savePJ(newPJ);
  await saveMembers(newMs);
  toast(`${m.name} graduado como Pós-Júnior com ${frozenHours}h ✓`);
}

// ── Modal listeners ───────────────────────────────────────
function attachModalListeners(){
  const q=id=>document.getElementById(id);
  q('mClose')?.addEventListener('click',closeModal);
  q('mClose2')?.addEventListener('click',closeModal);

  if(S.modal==='login'){
    const doLogin=async()=>{
      const em=q('mEmail')?.value,ps=q('mPass')?.value;
      if(!em||!ps){toast('Preencha e-mail e senha',true);return;}
      try{await auth.signInWithEmailAndPassword(em,ps);closeModal();}
      catch{toast('Credenciais inválidas',true);}
    };
    q('doLogin')?.addEventListener('click',doLogin);
    q('mPass')?.addEventListener('keydown',e=>{if(e.key==='Enter') doLogin();});
  }

  if(S.modal==='importCSV'){
    let parsed=[];
    const preview=q('csvPreview'),doBtn=q('doImport');
    const parseCSV=text=>{
      const lines=text.trim().split(/\r?\n/).filter(l=>l.trim());
      if(lines.length<2){preview.innerHTML=`<p style="color:var(--red);font-size:12px">Arquivo vazio.</p>`;return;}
      const header=lines[0].toLowerCase().split(',').map(s=>s.trim().replace(/^"|"$/g,''));
      const idx=f=>header.findIndex(h=>h.includes(f));
      const ni=idx('nome'),ci=idx('cargo'),di=Math.max(idx('entrada'),idx('data_e')),xi=Math.max(idx('saida'),idx('data_s')),ei=idx('extra'),pi=idx('desconto');
      parsed=lines.slice(1).map(l=>{
        const cols=l.split(',').map(s=>s.trim().replace(/^"|"$/g,''));
        const name=ni>=0?cols[ni]:'';if(!name) return null;
        const rk=ci>=0?(cols[ci]||'membro'):'membro';
        const sd=di>=0?cols[di]:today();
        return{name,roleKey:rk in S.roles?rk:'membro',startDate:sd||today(),exitDate:xi>=0?cols[xi]:'',extraHours:ei>=0?parseInt(cols[ei])||0:0,penaltyHours:pi>=0?parseInt(cols[pi])||0:0};
      }).filter(Boolean);
      if(!parsed.length){preview.innerHTML=`<p style="color:var(--red);font-size:12px">Nenhum membro válido.</p>`;return;}
      preview.innerHTML=`<p style="font-size:12px;color:var(--green);margin-bottom:8px">${parsed.length} membro(s):</p>
        <div style="max-height:150px;overflow-y:auto;background:var(--bg2);border-radius:8px;padding:10px;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--txt2)">
        ${parsed.map(r=>`<div style="padding:2px 0">${r.name} · ${(S.roles[r.roleKey]||DEF_ROLES.membro).label} · ${r.startDate}</div>`).join('')}
        </div>`;
      doBtn.style.display='inline-flex';
    };
    const handleFile=f=>{const r=new FileReader();r.onload=e=>parseCSV(e.target.result);r.readAsText(f,'UTF-8');};
    q('csvFile')?.addEventListener('change',e=>{if(e.target.files[0]) handleFile(e.target.files[0]);});
    const dz=q('dropZone');
    dz?.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
    dz?.addEventListener('dragleave',()=>dz.classList.remove('drag'));
    dz?.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);});
    doBtn?.addEventListener('click',async()=>{
      const newMs=parsed.map(r=>({id:uid(),name:r.name,startDate:r.startDate,exitDate:r.exitDate||'',photo:'',roleHistory:[{role:r.roleKey,date:r.startDate}],conductHistory:[],extraHours:r.extraHours,penaltyHours:r.penaltyHours,isOverdelivery:false}));
      const updated=[...S.members,...newMs];S.members=updated;await saveMembers(updated);closeModal();render();
    });
  }

  if(S.modal==='addRole'){
    q('doAddRole')?.addEventListener('click',()=>{
      const key=q('roleKey')?.value.trim().toLowerCase().replace(/\s+/g,'_');
      const label=q('roleName')?.value.trim();
      const hrs=parseInt(q('roleHrs')?.value)||8;
      if(!key||!label){toast('Preencha todos os campos',true);return;}
      if(S.roles[key]){toast('Chave ja existe',true);return;}
      S.roles={...S.roles,[key]:{label,hours:hrs}};closeModal();render();
    });
  }

  if(S.modal==='graduatePJ'){
    q('doGraduateM')?.addEventListener('click',async()=>{
      const mid=q('pjMemberM')?.value,pjDate=q('pjDateM')?.value||today(),pjNote=q('pjNoteM')?.value||'';
      if(!mid){toast('Selecione o membro',true);return;}
      const m=S.members.find(x=>x.id===mid);
      if(!confirm(`Graduar ${m?.name} como Pos-Junior? Essa acao e irreversivel.`)) return;
      await doGraduateAction(mid,pjDate,pjNote);
      closeModal();render();
    });
  }
}

// Graduation helper
async function doGraduateAction(mid,pjDate,pjNote){
  const m=S.members.find(x=>x.id===mid);
  if(!m){toast('Membro nao encontrado',true);return;}
  const frozenHours=accumulated(m);
  const pjMember={...m,isPJ:true,pjDate,pjNote:pjNote||'',frozenHours,exitDate:pjDate};
  const newPJ=[...S.pjMembers,pjMember];
  const newMs=S.members.filter(x=>x.id!==mid);
  S.pjMembers=newPJ;S.members=newMs;
  await savePJ(newPJ);
  await saveMembers(newMs);
  toast(`${m.name} graduado como Pos-Junior com ${frozenHours}h !`);
}

// Main listeners
function attachListeners(){
  const on=(id,ev,fn)=>document.getElementById(id)?.addEventListener(ev,fn);
  let _newPhoto='';
  let _editPhoto='';

  // Nav
  document.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click',()=>{S.view=b.dataset.view;render();}));
  on('loginBtn','click',()=>{S.modal='login';render();});
  on('logoutBtn','click',()=>auth.signOut());

  // Search / sort / filter
  on('searchInput','input',e=>{S.search=e.target.value;render();});
  on('sortSelect','change',e=>{S.sort=e.target.value;render();});
  on('toggleInactive','click',()=>{S.showInactive=!S.showInactive;render();});

  // Export / import
  on('exportBtn','click',exportCSV);on('exportBtn2','click',exportCSV);
  on('importBtn','click',()=>{S.modal='importCSV';renderModal();});
  on('importBtn2','click',()=>{S.modal='importCSV';renderModal();});
  on('addMemberBtn','click',()=>{S.view='admin';render();});
  on('promotePJBtn','click',()=>{S.modal='graduatePJ';renderModal();});

  // Photo new member
  document.getElementById('newPhotoFile')?.addEventListener('change',async e=>{
    const f=e.target.files[0];if(!f) return;
    try{
      _newPhoto=await readImageAsBase64(f);
      const prev=document.getElementById('newPhotoPreview');
      if(prev) prev.innerHTML=`<img src="${_newPhoto}" style="width:100%;height:100%;object-fit:cover;border-radius:12px">`;
    }catch(err){toast(err.message,true);}
  });

  // Photo edit
  document.getElementById('photoMember')?.addEventListener('change',e=>{
    const mid=e.target.value;const m=S.members.find(x=>x.id===mid);
    const prev=document.getElementById('editPhotoPreview');if(!prev) return;
    if(m?.photo) prev.innerHTML=`<img src="${m.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:12px">`;
    else prev.textContent=m?initials(m.name):'--';
    _editPhoto='';
  });
  document.getElementById('editPhotoFile')?.addEventListener('change',async e=>{
    const f=e.target.files[0];if(!f) return;
    try{
      _editPhoto=await readImageAsBase64(f);
      const prev=document.getElementById('editPhotoPreview');
      if(prev) prev.innerHTML=`<img src="${_editPhoto}" style="width:100%;height:100%;object-fit:cover;border-radius:12px">`;
    }catch(err){toast(err.message,true);}
  });
  on('doSavePhoto','click',async()=>{
    const mid=document.getElementById('photoMember')?.value;
    if(!mid){toast('Selecione um membro',true);return;}
    if(!_editPhoto){toast('Selecione uma foto primeiro',true);return;}
    const up=S.members.map(m=>m.id===mid?{...m,photo:_editPhoto}:m);
    S.members=up;await saveMembers(up);_editPhoto='';render();
  });
  on('doRemovePhoto','click',async()=>{
    const mid=document.getElementById('photoMember')?.value;
    if(!mid){toast('Selecione um membro',true);return;}
    const up=S.members.map(m=>m.id===mid?{...m,photo:''}:m);
    S.members=up;await saveMembers(up);render();
  });

  // Add member
  on('doAddMember','click',async()=>{
    const name=document.getElementById('newName')?.value.trim();
    const role=document.getElementById('newRole')?.value||'membro';
    const date=document.getElementById('newDate')?.value||today();
    if(!name){toast('Informe o nome',true);return;}
    const m={id:uid(),name,startDate:date,exitDate:'',photo:_newPhoto||'',roleHistory:[{role,date}],conductHistory:[],extraHours:0,penaltyHours:0,isOverdelivery:false};
    const up=[...S.members,m];S.members=up;await saveMembers(up);_newPhoto='';render();
  });

  // Promote role
  on('doPromo','click',async()=>{
    const mid=document.getElementById('promoMember')?.value;
    const role=document.getElementById('promoRole')?.value;
    const date=document.getElementById('promoDate')?.value||today();
    if(!mid){toast('Selecione o membro',true);return;}
    const up=S.members.map(m=>m.id===mid?{...m,roleHistory:[...(m.roleHistory||[]),{role,date}]}:m);
    S.members=up;await saveMembers(up);render();
  });

  // Graduate PJ from admin panel
  on('doGraduate','click',async()=>{
    const mid=document.getElementById('pjMember')?.value;
    const pjDate=document.getElementById('pjDate')?.value||today();
    const pjNote=document.getElementById('pjNote')?.value||'';
    if(!mid){toast('Selecione o membro',true);return;}
    const m=S.members.find(x=>x.id===mid);
    if(!confirm(`Graduar ${m?.name} como Pos-Junior? Irreversivel pelo painel.`)) return;
    await doGraduateAction(mid,pjDate,pjNote);render();
  });

  // Exit
  on('doExit','click',async()=>{
    const mid=document.getElementById('exitMember')?.value;
    const date=document.getElementById('exitDate')?.value||today();
    if(!mid){toast('Selecione o membro',true);return;}
    const m=S.members.find(x=>x.id===mid);
    if(!confirm(`Registrar saida de ${m?.name} em ${fmtDate(date)}?`)) return;
    const up=S.members.map(x=>x.id===mid?{...x,exitDate:date,isOverdelivery:false}:x);
    S.members=up;await saveMembers(up);render();
  });

  // Adjustments
  on('doAdj','click',async()=>{
    const mid=document.getElementById('adjMember')?.value;
    const extra=parseInt(document.getElementById('adjExtra')?.value)||0;
    const pen=parseInt(document.getElementById('adjPenalty')?.value)||0;
    const od=document.getElementById('adjOD')?.value==='1';
    const odDate=document.getElementById('adjODDate')?.value||'';
    if(!mid){toast('Selecione o membro',true);return;}
    const up=S.members.map(m=>m.id===mid?{...m,extraHours:extra,penaltyHours:pen,isOverdelivery:od,overdeliveryDate:odDate}:m);
    S.members=up;await saveMembers(up);render();
  });

  // Conduct
  on('doCond','click',async()=>{
    const mid=document.getElementById('condMember')?.value;
    const pts=parseInt(document.getElementById('condPts')?.value)||4;
    const reason=document.getElementById('condReason')?.value.trim();
    const date=document.getElementById('condDate')?.value||today();
    if(!mid||!reason){toast('Selecione membro e informe o motivo',true);return;}
    const up=S.members.map(m=>m.id===mid?{...m,conductHistory:[...(m.conductHistory||[]),{id:uid(),points:pts,reason,date}]}:m);
    S.members=up;await saveMembers(up);render();
  });

  // Inline patch (table inputs)
  document.querySelectorAll('[data-patch]').forEach(inp=>{
    inp.addEventListener('change',async e=>{
      const mid=e.target.dataset.patch,field=e.target.dataset.field;
      let val=e.target.value;
      if(field==='extraHours'||field==='penaltyHours') val=parseInt(val)||0;
      const up=S.members.map(m=>m.id===mid?{...m,[field]:val}:m);
      S.members=up;await saveMembers(up);render();
    });
  });

  // OD toggle
  document.querySelectorAll('[data-od]').forEach(btn=>{
    if(btn.disabled) return;
    btn.addEventListener('click',async()=>{
      const mid=btn.dataset.od;
      const up=S.members.map(m=>m.id===mid?{...m,isOverdelivery:!m.isOverdelivery}:m);
      S.members=up;await saveMembers(up);render();
    });
  });

  // Delete member
  document.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const mid=btn.dataset.del,m=S.members.find(x=>x.id===mid);
      if(!confirm(`Remover ${m?.name} permanentemente?`)) return;
      const up=S.members.filter(x=>x.id!==mid);S.members=up;await saveMembers(up);render();
    });
  });

  // Delete PJ
  document.querySelectorAll('[data-del-pj]').forEach(btn=>{
    btn.addEventListener('click',async e=>{
      e.stopPropagation();
      const mid=btn.dataset.delPj,m=S.pjMembers.find(x=>x.id===mid);
      if(!confirm(`Remover ${m?.name} da lista Pos-Junior?`)) return;
      const up=S.pjMembers.filter(x=>x.id!==mid);S.pjMembers=up;await savePJ(up);render();
    });
  });

  // Delete conduct entry
  document.querySelectorAll('[data-del-conduct]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const mid=btn.dataset.delConduct,cid=btn.dataset.condId;
      const up=S.members.map(m=>m.id===mid?{...m,conductHistory:(m.conductHistory||[]).filter(h=>h.id!==cid)}:m);
      S.members=up;await saveMembers(up);render();
    });
  });

  // Conduct accordion
  document.querySelectorAll('[data-cid]').forEach(el=>{
    el.addEventListener('click',()=>{const id=el.dataset.cid;S.openConduct[id]=!S.openConduct[id];render();});
  });

  // Card click -> detail (dashboard)
  document.querySelectorAll('.member-card').forEach(card=>{
    card.addEventListener('click',()=>{const m=S.members.find(x=>x.id===card.dataset.id);if(m) showDetail(m);});
  });

  // PJ card click -> detail
  document.querySelectorAll('.pj-card').forEach(card=>{
    card.addEventListener('click',e=>{
      if(e.target.closest('[data-del-pj]')) return;
      const m=S.pjMembers.find(x=>x.id===card.dataset.pjId);if(m) showDetail({...m,isPJ:true});
    });
  });

  // Roles view
  on('addRoleBtn','click',()=>{S.modal='addRole';renderModal();});
  on('saveRolesBtn','click',async()=>{
    const newRoles={};
    document.querySelectorAll('[data-rk]').forEach(inp=>{
      const k=inp.dataset.rk,f=inp.dataset.rf;
      if(!newRoles[k]) newRoles[k]={...S.roles[k]};
      if(f==='label') newRoles[k].label=inp.value.trim();
      if(f==='hours') newRoles[k].hours=parseInt(inp.value)||8;
    });
    S.roles=Object.keys(S.roles).reduce((acc,k)=>{acc[k]=newRoles[k]||S.roles[k];return acc;},{});
    await saveRoles(S.roles);render();
  });
  document.querySelectorAll('[data-del-role]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const k=btn.dataset.delRole;
      const inUse=S.members.some(m=>(m.roleHistory||[]).some(r=>r.role===k));
      if(inUse&&!confirm(`Cargo "${k}" esta em uso. Remover mesmo assim?`)) return;
      if(!inUse&&!confirm(`Remover cargo "${k}"?`)) return;
      const r={...S.roles};delete r[k];S.roles=r;await saveRoles(S.roles);render();
    });
  });
}

// Detail modal
function showDetail(m){
  document.getElementById('detailLayer')?.remove();
  const layer=document.createElement('div');layer.className='overlay';layer.id='detailLayer';
  const pts=activePts(m.conductHistory),acc=accumulated(m),rate=weeklyRate(m),cc=condColor(pts),act=isActive(m),isPJ=!!m.isPJ;
  const avatarHtml=m.photo
    ?`<div style="width:52px;height:52px;border-radius:13px;overflow:hidden;flex-shrink:0"><img src="${m.photo}" style="width:100%;height:100%;object-fit:cover"></div>`
    :`<div style="width:52px;height:52px;border-radius:13px;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:${isPJ?'var(--purple)':'var(--accent)'};flex-shrink:0">${initials(m.name)}</div>`;
  const breakdown=(m.roleHistory||[]).sort((a,b)=>new Date(a.date)-new Date(b.date)).map((r,i,arr)=>{
    const s=new Date(r.date),ps=s>SYS_START?s:SYS_START;
    const endDate=isPJ?new Date(m.pjDate||m.exitDate||today()):m.exitDate?new Date(m.exitDate):new Date();
    const pe=arr[i+1]?new Date(arr[i+1].date):endDate;const actualPe=pe<endDate?pe:endDate;
    if(actualPe<=ps) return null;
    const wks=(actualPe-ps)/(7*864e5);const h=Math.floor(wks*roleHours(r.role));
    return{label:(S.roles[r.role]||DEF_ROLES.membro).label,hours:h,weeks:wks.toFixed(1),from:fmtDate(r.date),to:arr[i+1]?fmtDate(arr[i+1].date):isPJ?fmtDate(m.pjDate):m.exitDate?fmtDate(m.exitDate):'hoje'};
  }).filter(Boolean);

  layer.innerHTML=`<div class="modal modal-md" style="animation:fadeUp .22s ease">
    <div class="modal-header">
      <div style="display:flex;align-items:center;gap:14px">
        ${avatarHtml}
        <div>
          <div class="modal-title">${m.name}</div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap">
            <span style="font-size:11px;font-family:'JetBrains Mono',monospace;color:${isPJ?'var(--purple)':'var(--accent)'}">${curRoleLabel(m)}</span>
            ${isPJ?'<span class="badge badge-p" style="font-size:9px">Pos-Junior</span>':`<span class="badge ${act?'badge-g':'badge-gray'}" style="font-size:9px">${act?'Ativo':'Inativo'}</span>`}
          </div>
        </div>
      </div>
      <button class="modal-close" id="detailClose">X</button>
    </div>
    <div class="modal-body">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px">
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px">
          <div style="font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">${isPJ?'Horas Congeladas':act?'Horas Acumuladas':'Horas (final)'}</div>
          <div style="font-size:28px;font-weight:700;color:${isPJ?'var(--purple)':'var(--green)'};font-family:'Syne',sans-serif">${acc}<span style="font-size:13px;color:${isPJ?'var(--purple2)':'var(--green2)'};margin-left:2px">h</span></div>
        </div>
        ${!isPJ?`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px">
          <div style="font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">Ritmo Semanal</div>
          <div style="font-size:22px;font-weight:700;color:${act?'var(--accent)':'var(--txt3)'};font-family:'Syne',sans-serif">${act?rate+'h':'--'}</div>
        </div>`:''}
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px">
          <div style="font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">Tempo de Casa</div>
          <div style="font-size:18px;font-weight:700;color:var(--txt);font-family:'Syne',sans-serif">${fmtTenure(m.startDate)}</div>
        </div>
        ${S.isAdmin&&!isPJ?`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px">
          <div style="font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">Conduta</div>
          <div style="font-size:22px;font-weight:700;font-family:'Syne',sans-serif" class="foot-val ${cc}">${pts}/20</div>
        </div>`:''}
      </div>
      ${isPJ?`<div style="background:var(--purple-bg);border:1px solid rgba(167,139,250,.2);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--purple);font-family:'JetBrains Mono',monospace">Graduado em ${fmtDate(m.pjDate)} - horas congeladas</div>`:''}
      ${!isPJ&&m.exitDate?`<div style="background:var(--red-bg);border:1px solid rgba(248,113,113,.2);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--red);font-family:'JetBrains Mono',monospace">Saida declarada em ${fmtDate(m.exitDate)}</div>`:''}
      ${!isPJ&&m.isOverdelivery?`<div style="background:var(--amber-bg);border:1px solid rgba(251,191,36,.2);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--amber)">Overdelivery ativo${m.overdeliveryDate?' - '+m.overdeliveryDate:''}</div>`:''}
      ${m.pjNote?`<div style="background:var(--purple-bg);border:1px solid rgba(167,139,250,.15);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--txt2);font-style:italic">"${m.pjNote}"</div>`:''}
      ${breakdown.length?`<div>
        <div style="font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Horas por Cargo</div>
        <div style="display:flex;flex-direction:column;gap:6px">
        ${breakdown.map(b=>`<div style="display:flex;justify-content:space-between;align-items:center;background:var(--bg2);border-radius:8px;padding:8px 12px">
          <div><div style="font-size:12px;font-weight:600;color:var(--txt)">${b.label}</div><div style="font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--txt3)">${b.from} > ${b.to} - ${b.weeks}sem</div></div>
          <div style="font-size:15px;font-weight:700;font-family:'Syne',sans-serif;color:${isPJ?'var(--purple)':'var(--green)'}">${b.hours}h</div>
        </div>`).join('')}
        </div>
      </div>`:''}
    </div>
  </div>`;
  document.body.appendChild(layer);
  layer.addEventListener('click',e=>{if(e.target===layer) layer.remove();});
  document.getElementById('detailClose')?.addEventListener('click',()=>layer.remove());
}

// Firebase init
(async()=>{
  try{await auth.signInAnonymously();}catch{}
  auth.onAuthStateChanged(u=>{
    S.user=u;S.isAdmin=!!(u&&!u.isAnonymous);
    memberDoc().onSnapshot(snap=>{
      if(snap.exists) S.members=snap.data().members||[];
      S.loading=false;render();
    },()=>{S.loading=false;render();});
    pjDoc().onSnapshot(snap=>{
      if(snap.exists) S.pjMembers=snap.data().members||[];
      render();
    },()=>{});
    cfgDoc().onSnapshot(snap=>{
      if(snap.exists&&snap.data().roles) S.roles={...DEF_ROLES,...snap.data().roles};
      render();
    },()=>{});
  });
})();
</script>
